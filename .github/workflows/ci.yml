name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=navaar --cov-report=term-missing --cov-fail-under=45

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # commit the pinned image tag back to main
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps pin: after the SHA-tagged image is in the registry, rewrite the
      # kustomize image tag to this commit and push it back to main. ArgoCD then
      # syncs the manifest and the exact image it references together — closing the
      # window where a manifest change could roll out against a stale :latest.
      # Pushes made with GITHUB_TOKEN don't re-trigger workflows; [skip ci] is belt
      # and suspenders.
      - name: Pin image to commit SHA
        run: |
          short_sha="${GITHUB_SHA::7}"
          sed -i -E "s/^(\s*newTag:).*/\1 ${short_sha}/" deploy/k8s/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- deploy/k8s/kustomization.yaml; then
            echo "Image tag already pinned to ${short_sha}; nothing to commit."
            exit 0
          fi
          git add deploy/k8s/kustomization.yaml
          git commit -m "ci: pin image to ${short_sha} [skip ci]"
          git push origin HEAD:main
