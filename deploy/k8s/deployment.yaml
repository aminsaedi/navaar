apiVersion: apps/v1
kind: Deployment
metadata:
  name: navaar
  namespace: navaar
  labels:
    app: navaar
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: navaar
  template:
    metadata:
      labels:
        app: navaar
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: thinkcentre
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # Normalize /data ownership to the runtime uid. Self-heals the ownership
        # drift that `kubectl cp` (which writes as the local user's uid) leaves
        # behind — previously this had to be chowned by hand after each copy.
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /data || true"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: navaar
          # Tag is pinned to the build's commit SHA by kustomization.yaml (CI rewrites
          # `newTag`). Immutable per-commit, so IfNotPresent avoids needless re-pulls.
          image: ghcr.io/aminsaedi/navaar:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: navaar-config
            - secretRef:
                name: navaar-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: navaar-data
