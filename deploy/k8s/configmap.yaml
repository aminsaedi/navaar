apiVersion: v1
kind: ConfigMap
metadata:
  name: navaar-config
  namespace: navaar
data:
  NAVAAR_TELEGRAM_CHANNEL_ID: "-1003744100092"
  NAVAAR_TELEGRAM_ADMIN_USER_IDS: "[701578028]"
  NAVAAR_YTMUSIC_PLAYLIST_ID: "PLuiEUR-229Ow9l3QVvnER7F1cHDmuFHRE"
  NAVAAR_YTMUSIC_AUTH_FILE: "/data/oauth.json"
  NAVAAR_SYNC_INTERVAL_TG_TO_YT: "60"
  NAVAAR_SYNC_INTERVAL_YT_TO_TG: "120"
  NAVAAR_MAX_RETRIES: "3"
  NAVAAR_DATABASE_URL: "sqlite+aiosqlite:////data/navaar.db"
  NAVAAR_API_PORT: "8080"
  NAVAAR_LOG_LEVEL: "INFO"
  NAVAAR_YTDLP_COOKIES_FILE: "/data/cookies.txt"
  NAVAAR_SPOTIFY_CACHE_PATH: "/data/.spotify_cache"
  NAVAAR_SPOTIFY_PLAYLIST_ID: "3vQmpdPs2YTjJGAYWZkt7O"
  NAVAAR_SYNC_INTERVAL_TG_TO_SP: "60"
  NAVAAR_SYNC_INTERVAL_SP_TO_TG: "120"
  NAVAAR_SYNC_INTERVAL_YT_TO_SP: "120"
  NAVAAR_SYNC_INTERVAL_SP_TO_YT: "120"
  # Natural-language control (reply+@mention the bot, or DM it): the Claude Agent
  # SDK runs Claude Code inside the pod, pointed at the Anthropic endpoint. It has
  # full Bash/file tools (runs as uid 1000 next to the DB and tokens) — accepted.
  NAVAAR_NL_AGENT_ENABLED: "true"
  NAVAAR_NL_MODEL: "claude-sonnet-4-6"
  # Anthropic endpoint the Claude Agent SDK / Claude Code talks to. This proxy
  # executes the server-side web_search tool (so the agent's WebSearch works).
  # The API key (a proxy virtual key) lives in the navaar-secrets Secret, NOT here
  # (configmap is committed to git). secretRef overrides this configmap.
  ANTHROPIC_BASE_URL: "https://claude-proxy.aminsaedi.com"
  # Writable HOME for the Claude Code CLI's state (~/.claude); /data is the PVC,
  # owned by uid 1000 via the init container.
  HOME: "/data/agent"
